version: '3.8'

services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  user-service:
    build:
      context: ./user-service
    ports:
      - "5000:5000"
    env_file:
      - ./user-service/.env
    depends_on:
      - mongo
      - redis
      - kafka

  post-service:
    build:
      context: ./post-service
    ports:
      - "5001:5001"
    env_file:
      - ./post-service/.env
    depends_on:
      - mongo
      - redis
      - kafka

  like-service:
    build:
      context: ./like-service
    ports:
      - "5003:5003"
    env_file:
      - ./like-service/.env
    depends_on:
      - mongo

volumes:
  mongo-data:
